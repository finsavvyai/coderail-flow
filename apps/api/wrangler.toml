name = "coderail-flow-api"
main = "src/index.ts"
compatibility_date = "2025-12-13"
compatibility_flags = ["nodejs_compat"]
minify = true

# ---- D1 ----
[[d1_databases]]
binding = "DB"
database_name = "coderail-flow-db"
database_id = "4943d70b-ed7e-4440-b46d-ee7201f5e551"

# ---- R2 (optional in this starter) ----
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "coderail-flow-artifacts"

# ---- Browser Rendering ----
[browser]
binding = "BROWSER"

# ---- Optional KMS Service Binding ----
# Uncomment and set to your KMS worker/service when enabling Task 15 KMS key retrieval.
# [[services]]
# binding = "CLOUDFLARE_KMS"
# service = "coderail-flow-kms"

[vars]
APP_ENV = "production"
PUBLIC_BASE_URL = "https://flow.coderail.dev"
ADDITIONAL_PUBLIC_ORIGINS = "https://coderail-flow.pages.dev"
AUTH_URL = "https://api.coderail.dev/auth"
CLAW_ENDPOINT = "https://claw-gateway.broad-dew-49ad.workers.dev"
CLAW_PROJECT_ID = "coderailflow"
# AUTH_ENCRYPTION_KEY = "set-via-wrangler-secret"
# AUTH_SECRET = "set-via-wrangler-secret"
# GOOGLE_CLIENT_ID = "set-via-wrangler-secret"
# GOOGLE_CLIENT_SECRET = "set-via-wrangler-secret"
# GITHUB_CLIENT_ID = "set-via-wrangler-secret"
# GITHUB_CLIENT_SECRET = "set-via-wrangler-secret"

# ---- Workflows (Durable Execution) ----
[[workflows]]
name = "flow-execution"
binding = "FLOW_WORKFLOW"
class_name = "FlowExecutionWorkflow"

# ---- Cron Triggers ----
[triggers]
crons = ["* * * * *"]

# ──────────────────────────────────────
# Staging environment: `wrangler deploy --env staging`
# ──────────────────────────────────────
[env.staging]
name = "coderail-flow-api-staging"

[env.staging.vars]
APP_ENV = "staging"
PUBLIC_BASE_URL = "https://coderail-flow-staging.pages.dev"
# AUTH_URL = "https://your-staging-auth-origin/auth"
AUTH_URL = "https://coderail-flow-api-staging.workers.dev/auth"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "coderail-flow-db-staging"
database_id = ""  # Create with: wrangler d1 create coderail-flow-db-staging

[[env.staging.r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "coderail-flow-artifacts-staging"

[env.staging.browser]
binding = "BROWSER"
